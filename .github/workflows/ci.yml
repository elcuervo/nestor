name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download all Tor binaries
        run: make download-tor

      - name: Vet all platforms
        run: |
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go vet ./...
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go vet ./...
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go vet ./...
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go vet ./...

      - name: Test
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go test -count=1 ./...

      - name: Build all platforms
        run: |
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -o /dev/null .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -o /dev/null .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -o /dev/null .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o /dev/null .
